[project]
name = "kogniterm"
version = "0.5.0"
description = "KogniTerm: Tu agente evolutivo de terminal inteligente 🚀"
authors = [
    { name = "Gato Villano", email = "stola@disroot.org" }
]
dependencies = [
    "python-dotenv",
    "langchain",
    "langchain-core",
    "langgraph",
    "prompt_toolkit",
    "langchain_mcp_adapters",
    "langchain_community",
    "beautifulsoup4",
    "PyGithub",
    "rich",
    "matplotlib",
    "google-genai",
    "jupyter_client",
    "loguru",
    "colorama",
    "gitignore-parser",
    "watchdog",
    "litellm",
    "playwright",
    "tavily-python",
    "GitPython",
    "pydantic",
    "pydantic-settings",
    "chromadb",
    "urllib3<2",
    "pyautogui",
    "pywinctl",
    "opencv-python",
    "pillow",
    "python-xlib",
    "langchain-litellm",
    "nest_asyncio",
    "tiktoken",
    "requests",
    "crewai",
    "fastembed",
    "textual",
    "pyte",
    "fastapi",
    "uvicorn[standard]",
    "sse-starlette",
    "python-telegram-bot",
  ]
readme = "README.md"
requires-python = ">=3.9"
license = { file = "LICENSE" }
keywords = ["terminal", "ai", "agent", "assistant", "llm", "automation"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
]

[project.optional-dependencies]
dev = [
    "radon",
    "pylint",
    "pytest",
    "build",
    "twine",
]

[project.urls]
Homepage = "https://github.com/gatovillano/KogniTerm"
Repository = "https://github.com/gatovillano/KogniTerm"
Issues = "https://github.com/gatovillano/KogniTerm/issues"

[project.scripts]
kogniterm = "kogniterm.terminal.terminal:main"
kogniterm-server = "kogniterm.server.__main__:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = { find = {} }

[tool.setuptools.package-data]
kogniterm = ["*.txt", "*.json", "*.md"]
